<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050">
  <defs>
    <style>
      .bg { fill: #f7f7f2; }
      .title { font: 700 48px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2933; }
      .subtitle { font: 400 24px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #52606d; }
      .box-title { font: 700 28px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #102a43; }
      .box-text { font: 400 21px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #334e68; }
      .small { font: 400 18px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #52606d; }
      .root { fill: #ffffff; stroke: #243b53; stroke-width: 3; rx: 18; }
      .rule { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2.5; rx: 16; }
      .source { fill: #ecfdf3; stroke: #15803d; stroke-width: 2.5; rx: 16; }
      .wiki { fill: #fff7ed; stroke: #c2410c; stroke-width: 2.5; rx: 16; }
      .template { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2.5; rx: 16; }
      .log { fill: #fefce8; stroke: #a16207; stroke-width: 2.5; rx: 16; }
      .arrow { stroke: #627d98; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .note { fill: #ffffff; stroke: #bcccdc; stroke-width: 2; rx: 14; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#627d98"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1050"/>

  <text class="title" x="80" y="90">你的本地经验库结构</text>
  <text class="subtitle" x="80" y="130">一句话：原始资料放 sources，整理答案放 wiki，规则和模板让 Agent 后续能继续维护。</text>

  <rect class="root" x="555" y="175" width="490" height="115"/>
  <text class="box-title" x="610" y="225">ycl 的日常经验库</text>
  <text class="box-text" x="610" y="262">入口：index.md / 经验库说明.md</text>

  <rect class="rule" x="80" y="380" width="310" height="185"/>
  <text class="box-title" x="115" y="430">AGENTS.md</text>
  <text class="box-text" x="115" y="470">给 Agent 看的规矩</text>
  <text class="small" x="115" y="510">先读什么</text>
  <text class="small" x="115" y="540">怎么新增资料</text>
  <text class="small" x="115" y="570">怎么避免乱改</text>

  <rect class="source" x="455" y="370" width="330" height="215"/>
  <text class="box-title" x="500" y="420">sources/</text>
  <text class="box-text" x="500" y="460">原始资料和证据库</text>
  <text class="small" x="500" y="500">原来的 Markdown</text>
  <text class="small" x="500" y="530">截图、脚本、配置记录</text>
  <text class="small" x="500" y="560">失败过程和成功过程</text>

  <rect class="wiki" x="835" y="370" width="330" height="215"/>
  <text class="box-title" x="880" y="420">wiki/</text>
  <text class="box-text" x="880" y="460">整理后的知识页</text>
  <text class="small" x="880" y="500">快速结论</text>
  <text class="small" x="880" y="530">标准流程</text>
  <text class="small" x="880" y="560">排查清单</text>

  <rect class="template" x="1210" y="380" width="310" height="185"/>
  <text class="box-title" x="1245" y="430">templates/</text>
  <text class="box-text" x="1245" y="470">以后新增时照着写</text>
  <text class="small" x="1245" y="510">source 模板</text>
  <text class="small" x="1245" y="540">wiki 模板</text>
  <text class="small" x="1245" y="570">故障排查模板</text>

  <rect class="log" x="455" y="670" width="330" height="155"/>
  <text class="box-title" x="500" y="720">log.md</text>
  <text class="box-text" x="500" y="760">更新记录</text>
  <text class="small" x="500" y="800">记录搬了什么、改了什么</text>

  <rect class="log" x="835" y="670" width="330" height="155"/>
  <text class="box-title" x="880" y="720">roadmap.md</text>
  <text class="box-text" x="880" y="760">后续改进计划</text>
  <text class="small" x="880" y="800">大改动先写这里，不乱改规则</text>

  <path class="arrow" d="M800 290 L240 380"/>
  <path class="arrow" d="M800 290 L620 370"/>
  <path class="arrow" d="M800 290 L1000 370"/>
  <path class="arrow" d="M800 290 L1360 380"/>
  <path class="arrow" d="M620 585 L620 670"/>
  <path class="arrow" d="M1000 585 L1000 670"/>
  <path class="arrow" d="M785 480 L835 480"/>

  <rect class="note" x="170" y="890" width="1260" height="90"/>
  <text class="box-text" x="210" y="930">白话理解：</text>
  <text class="box-text" x="350" y="930">sources 是原始证据，wiki 是整理后的答案，index 是地图，AGENTS 是规矩，templates 是以后扩展的模具。</text>
</svg>
